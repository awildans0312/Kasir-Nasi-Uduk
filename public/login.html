<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Nasi Uduk System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --primary: #e67e22;
      --primary-dark: #d35400;
      --text-main: #2d3436;
      --text-muted: #636e72;
      --bg-glass: rgba(255, 255, 255, 0.95);
      --shadow: 0 10px 30px rgba(0,0,0,0.1);
      --radius: 16px;
    }
    * { box-sizing: border-box; outline: none; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e67e22 0%, #f39c12 50%, #f1c40f 100%);
      height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--bg-glass); width: 100%; max-width: 400px; padding: 40px 30px;
      border-radius: var(--radius); box-shadow: var(--shadow); text-align: center;
    }
    .logo-icon { font-size: 48px; color: var(--primary); margin-bottom: 10px; }
    h2 { margin: 0 0 5px 0; color: var(--text-main); }
    p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #b2bec3; }
    input {
      width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #dfe6e9; border-radius: 10px;
      font-family: inherit; font-size: 15px; transition: all 0.3s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(230, 126, 34, 0.1); }
    button {
      width: 100%; padding: 14px; background: var(--primary); color: white; border: none;
      border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 16px;
      transition: all 0.3s;
    }
    button:hover { background: var(--primary-dark); }
    button:disabled { background: #bdc3c7; cursor: not-allowed; }
    .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Toast */
    .toast {
      position: fixed; top: 20px; right: 20px; background: white; padding: 12px 20px;
      border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 1000;
      border-left: 4px solid var(--success); animation: slideIn 0.3s ease;
    }
    .toast.error { border-left-color: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-icon"><i class="ph ph-bowl-food"></i></div>
    <h2>Selamat Datang!</h2>
    <p class="subtitle">Masuk ke sistem kasir Nasi Uduk</p>

    <form id="loginForm" onsubmit="event.preventDefault(); login();">
      <div class="form-group">
        <div class="input-wrapper">
          <i class="ph ph-user input-icon"></i>
          <input type="text" id="username" placeholder="Username" required autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <div class="input-wrapper">
          <i class="ph ph-lock-key input-icon"></i>
          <input type="password" id="password" placeholder="Password" required>
        </div>
      </div>
      <button type="submit" id="loginBtn">
        <span class="btn-text">Masuk Sekarang</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <div id="toastContainer"></div>

  <script>
    async function login() {
      const btn = document.getElementById("loginBtn");
      const btnText = document.querySelector(".btn-text");
      const spinner = document.querySelector(".spinner");
      
      btn.disabled = true;
      btnText.style.display = "none";
      spinner.style.display = "block";

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          credentials: "include", 
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        // --- LOGIKA PERBAIKAN ---
        if (res.ok || data.message.includes("berhasil")) {
            // 1. Simpan status login di browser (INI YANG PENTING)
            localStorage.setItem('isLoggedIn', 'true');
            
            showToast("Login Berhasil", "success");
            
            // 2. Redirect ke root ("/") agar Server memvalidasi session
            setTimeout(() => {
                window.location.href = "/"; 
            }, 1000);
        } else {
            showToast(data.message || "Login gagal", "error");
            resetButton();
        }

      } catch (error) {
        console.error(error);
        // Fallback jika offline
        if (username === "admin" && password === "123") {
            localStorage.setItem('isLoggedIn', 'true');
            showToast("Login Berhasil (Mode Demo)", "success");
            setTimeout(() => window.location.href = "/", 1000);
        } else {
            showToast("Gagal terhubung ke server", "error");
        }
        resetButton();
      }
    }

    function resetButton() {
      const btn = document.getElementById("loginBtn");
      const btnText = document.querySelector(".btn-text");
      const spinner = document.querySelector(".spinner");
      btn.disabled = false;
      btnText.style.display = "block";
      spinner.style.display = "none";
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }
  </script>
</body>
</html>
